
services:
  vega-nginx:
    image: nginx:alpine
    container_name: vega-nginx
    volumes:
      - ./optimal_cutting_backend/nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./optimal_cutting_backend/nginx/certs/domain.crt:/etc/nginx/domain.crt
      - ./optimal_cutting_backend/nginx/certs/domain.key:/etc/nginx/domain.key
    ports:
      - 80:80
      - 443:443
    restart: always
    depends_on:
      - vega-asp
 

  vega-redis:
    image: redis:alpine
    container_name: vega-redis
    restart: always
    volumes:
      - ./optimal_cutting_backend/redis/.redisdata:/data
    command: >
      sh -c '
        mkdir -p /usr/local/etc/redis &&
        echo "bind 0.0.0.0" > /usr/local/etc/redis/redis.conf &&
        echo "appendonly yes" >> /usr/local/etc/redis/redis.conf &&
        echo "appendfsync everysec" >> /usr/local/etc/redis/redis.conf &&
        echo "user default on nopass ~* +@all" > /usr/local/etc/redis/users.acl &&
        redis-server /usr/local/etc/redis/redis.conf --aclfile /usr/local/etc/redis/users.acl
      '

  vega-asp:
    container_name: vega-asp
    build:
      context: .
      dockerfile: optimal_cutting_backend/optimal_cutting_backend/Dockerfile
    environment:
        - ASPNETCORE_ENVIRONMENT=Release
        - ASPNETCORE_URLS=http://+:5000;
    volumes:
      - ~/.aspnet/https:/https:ro
    restart: always
    depends_on:
      - vega-redis
      - vega-postgres

  vega-postgres:
    image: postgis/postgis:17-3.5-alpine
    container_name: vega-postgres
    restart: always
    volumes:
      - ./optimal_cutting_backend/postgres/.postgresdata:/var/lib/postgresql/data/
      - ./optimal_cutting_backend/postgres/:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: "postgres"
      POSTGRES_PASSWORD: "olyannaa213"

  vega-npm:
    container_name: vega-npm
    build:
      context: ./optimal_cutting_backend/optimal_cutting_frontend/
      dockerfile: Dockerfile
    working_dir: /var/www/front
    tty: true
    volumes:
      - ./optimal_cutting_backend/optimal_cutting_frontend/:/var/www/front
      - ./optimal_cutting_backend/optimal_cutting_frontend/node_modules:/var/www/front/node_modules
    ports:
      - 3000:3000
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    command: ["npm", "run", "dev"]
    restart: always
    depends_on:
      - vega-asp